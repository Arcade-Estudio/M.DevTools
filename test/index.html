<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SocialFeed</title>
  <meta name="theme-color" content="#000">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #e7e9ea;
      max-width: 600px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #2f3336;
      background: rgba(0,0,0,0.95);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .icon { margin-left: auto; font-size: 20px; opacity: 0.7; }
    .tweet {
      display: flex;
      padding: 12px 16px;
      border-bottom: 1px solid #2f3336;
      transition: background 0.15s;
    }
    .tweet:active { background: #080808; }
    .tweet .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #1da1f2, #833ab4);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
      margin-right: 12px;
    }
    .tweet .body { flex: 1; min-width: 0; }
    .tweet .name { font-weight: 700; font-size: 14px; }
    .tweet .handle { color: #71767b; font-size: 13px; margin-left: 4px; }
    .tweet .text { font-size: 14px; margin-top: 2px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .tweet .time { color: #71767b; font-size: 12px; margin-top: 4px; }
    .tweet .actions {
      display: flex; gap: 48px; margin-top: 8px; color: #71767b; font-size: 13px;
    }
    .tweet .actions span { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
    .tweet .actions span:hover { color: #1da1f2; }
    .tweet .actions .liked { color: #f91880; }
    .like-btn { background: none; border: none; color: inherit; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px; border-radius: 4px; font-family: inherit; }
    .like-btn:hover { color: #f91880; }
    .like-btn.liked { color: #f91880; }
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1da1f2; color: #fff; padding: 8px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 600; z-index: 100;
      opacity: 1; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.hide { opacity: 0; }
    .tab-bar {
      display: flex; justify-content: space-around;
      padding: 8px 0; border-top: 1px solid #2f3336;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
      position: sticky; bottom: 0; z-index: 10;
    }
    .tab-bar span { font-size: 12px; color: #71767b; text-align: center; cursor: pointer; padding: 4px 12px; }
    .tab-bar span.active { color: #1da1f2; }
    .tab-bar span .emoji { font-size: 20px; display: block; margin-bottom: 2px; }
    .spinner { text-align: center; padding: 20px; color: #71767b; font-size: 13px; }
    .spinner::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #1da1f2; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .composer { display: flex; padding: 12px 16px; border-bottom: 1px solid #2f3336; align-items: flex-start; }
    .composer .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1da1f2; flex-shrink: 0; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
    .composer input { background: transparent; border: none; color: #e7e9ea; font-size: 16px; flex: 1; padding: 8px 0; outline: none; font-family: inherit; }
    .composer input::placeholder { color: #71767b; }
    .composer button { background: #1da1f2; border: none; color: #fff; font-weight: 700; font-size: 14px; padding: 8px 20px; border-radius: 999px; cursor: pointer; font-family: inherit; }
    .composer button:disabled { opacity: 0.5; }
    /* Forzar visibilidad del boton flotante de Eruda */
    #eruda-entry-btn {
      z-index: 2147483647 !important;
      bottom: 70px !important;
      right: 10px !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    #eruda-container { z-index: 2147483646 !important; }
    /* Badge de debug: muestra estado del SW/Eruda */
    #eruda-debug-badge {
      position: fixed; bottom: 4px; left: 4px;
      z-index: 2147483647; font-size: 9px; font-family: monospace;
      padding: 2px 6px; border-radius: 8px;
      background: rgba(0,0,0,0.75); color: #aaa;
      pointer-events: none; line-height: 1.4;
      max-width: 200px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    #eruda-debug-badge.ok { color: #4caf50; }
    #eruda-debug-badge.fail { color: #f44336; }
    #eruda-debug-badge.warn { color: #ff9800; }
  </style>
</head>
<body>
  <!-- Debug badge: diagnostico en tiempo real -->
  <div id="eruda-debug-badge" title="ErudaArcade Debug Status">iniciando...</div>

  <div class="header">
    <h1>Feed</h1>
    <span class="icon">&#8942;</span>
  </div>

  <div class="composer">
    <div class="avatar">T</div>
    <input id="tweet-input" placeholder="¿Que esta pasando?" maxlength="140">
    <button id="tweet-btn" disabled>Post</button>
  </div>

  <div id="feed">
    <div class="spinner">Cargando</div>
  </div>

  <div class="tab-bar">
    <span class="active"><span class="emoji">&#x1F4E3;</span>Feed</span>
    <span><span class="emoji">&#x1F50D;</span>Buscar</span>
    <span><span class="emoji">&#x1F4CC;</span>Notif</span>
    <span><span class="emoji">&#x1F464;</span>Perfil</span>
  </div>

  <div id="toast" class="toast hide">&#x2764; Guardado</div>

  <script>
    // ================================================================
    // ERUDA INJECTOR (funciona con o sin Service Worker)
    // ================================================================
    // Causa raiz del problema en incognito:
    //   - Los Service Workers NO FUNCIONAN en modo incognito
    //   - El SW registra pero nunca intercepta fetch => Eruda no se inyecta
    // Solucion: cargar Eruda directamente desde la pagina misma.
    // ================================================================
    (function() {
      var badge = document.getElementById('eruda-debug-badge');
      function setBadge(msg, cls) {
        badge.textContent = msg;
        badge.className = cls || '';
      }
      function log() {
        var a = Array.prototype.slice.call(arguments);
        a[0] = '[ErudaArcade] ' + a[0];
        (console.log || function(){}).apply(console, a);
      }
      function warn() {
        var a = Array.prototype.slice.call(arguments);
        a[0] = '[ErudaArcade] ' + a[0];
        (console.warn || function(){}).apply(console, a);
      }

      var ERUDA_CDN = 'https://cdn.jsdelivr.net/npm/eruda';
      var MAX_SW_WAIT = 3000;
      var POLL_MS = 200;
      var elapsed = 0;

      // --- 1. Intentar registrar SW (puede fallar en incognito) ---
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/ErudaArcade-sw.js').then(function(reg) {
          log('SW registrado exitosamente:', reg.scope);
          setBadge('SW registrado, esperando Eruda...');
          if (reg.active) {
            log('SW ya activo');
            // SW activo -> va a interceptar la proxima navegacion
            // En la pagina actual puede que ya haya interceptado si es un reload
          }
        }).catch(function(err) {
          warn('SW registro FALLIDO:', err.message);
          setBadge('SW fallo: ' + err.message, 'warn');
        });
      } else {
        warn('SW no soportado (modo incognito?)');
        setBadge('SW no soportado', 'warn');
      }

      // --- 2. Esperar que Eruda aparezca (via SW), si no, cargarlo directo ---
      var poll = setInterval(function() {
        elapsed += POLL_MS;
        if (window.eruda && typeof window.eruda.init === 'function') {
          clearInterval(poll);
          log('Eruda ya disponible (probablemente vía SW)');
          initEruda();
          return;
        }
        if (elapsed >= MAX_SW_WAIT) {
          clearInterval(poll);
          log('SW no inyectó Eruda, cargando directamente desde CDN...');
          setBadge('cargando eruda directo...', 'warn');
          var s = document.createElement('script');
          s.src = ERUDA_CDN;
          s.onload = function() {
            log('Eruda CDN cargado');
            initEruda();
            loadCustomPlugins();
          };
          s.onerror = function() {
            warn('Error cargando Eruda CDN');
            setBadge('CDN error!', 'fail');
          };
          document.head.appendChild(s);
        }
      }, POLL_MS);

      function initEruda() {
        try {
          eruda.init({
            autoScale: true,
            defaults: {
              transparency: 0.9,
              displaySize: 60,
              theme: "Dark"
            }
          });
          log('Eruda inicializado correctamente');
          setBadge('eruda OK', 'ok');
        } catch(e) {
          warn('Error en eruda.init():', e);
          setBadge('eruda error: '+e.message, 'fail');
        }
      }

      // --- 3. Cargar plugins custom (si no los inyectó el SW) ---
      function loadCustomPlugins() {
        if (window.__appTabLoaded && window.__netwatLoaded &&
            window.__elementsPlusLoaded && window.__objInspectLoaded) {
          log('Plugins ya cargados (por SW)');
          setBadge('eruda + plugins OK (SW)', 'ok');
          return;
        }
        log('Cargando plugins desde eruda-inject.js...');
        setBadge('cargando plugins...', 'warn');
        var inj = document.createElement('script');
        inj.src = 'eruda-inject.js';
        inj.onload = function() {
          log('Plugins cargados');
          setBadge('eruda + plugins OK', 'ok');
        };
        inj.onerror = function() {
          warn('Error cargando plugins');
          setBadge('plugins error', 'fail');
        };
        document.head.appendChild(inj);
      }
    })();

    // ================================================================
    // DATOS SIMULADOS (SocialFeed)
    // ================================================================
    var USERS = [
      { name: 'Ana Dev', handle: '@anadev', color: '#1da1f2', initial: 'A' },
      { name: 'Carlos JS', handle: '@carlosjs', color: '#833ab4', initial: 'C' },
      { name: 'Maria UX', handle: '@maria_ux', color: '#f91880', initial: 'M' },
      { name: 'Pedro Tech', handle: '@pedrotech', color: '#00ba7c', initial: 'P' },
      { name: 'Laura Web', handle: '@laura_web', color: '#ff6f00', initial: 'L' }
    ]
    var TEXTS = [
      'Probando MobileDevTools con Eruda via Service Worker &#128640;',
      'El floating widget de Eruda se ve igual que las devtools de Chrome &#128526;',
      'Service Worker injecta Eruda automaticamente en todas las paginas &#9889;',
      'Se puede inspeccionar DOM, Network, Console y mas desde el movil &#128241;',
      'Esto funciona como el bookmarklet de Eruda pero sin necesidad de agregarlo manualmente &#129302;',
      'Las custom tabs (AppTab, NetWat, Elements+, ObjInspect) agregan funcionalidad extra &#128200;',
      'Haciendo debug mobile como la gente &#128170;',
      '#MobileDevTools es un proyecto open source para debug en celulares &#128588;'
    ]

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)] }
    function randomDate() {
      var d = new Date()
      d.setHours(d.getHours() - Math.floor(Math.random() * 24))
      d.setMinutes(Math.floor(Math.random() * 60))
      return d
    }
    function formatTime(d) {
      var h = d.getHours(), m = d.getMinutes()
      return (h%12||12) + ':' + (m<10?'0':'') + m + (h<12?' AM':' PM')
    }
    function relativeTime(d) {
      var diff = (Date.now() - d.getTime()) / 1000
      if (diff < 60) return Math.floor(diff) + 's'
      if (diff < 3600) return Math.floor(diff/60) + 'm'
      if (diff < 86400) return Math.floor(diff/3600) + 'h'
      return Math.floor(diff/86400) + 'd'
    }

    function generateTweet(id) {
      var user = USERS[id % USERS.length]
      var text = TEXTS[id % TEXTS.length]
      if (id >= TEXTS.length) text = 'Tweet generado #' + (id+1) + ' desde el test automatico &#128640;'
      if (id === 0) text = 'Acabo de descubrir MobileDevTools. El floating widget de Eruda injectado via Service Worker es una locura &#128562;'
      if (id === 1) text = 'Olvidate del bookmarklet. Con el Service Worker ya no necesitas abrir Eruda manualmente, aparece solo en cada pagina &#129395;'
      if (id === 4) text = '¿Sabian que puede ver IndexedDB, Cache API y localStorage desde el celular? La tab AppTab es god &#128293;'
      return {
        id: id,
        user: user,
        text: text,
        time: randomDate(),
        likes: Math.floor(Math.random() * 120),
        liked: false,
        comments: Math.floor(Math.random() * 15)
      }
    }

    function renderTweet(t) {
      var timeStr = relativeTime(t.time)
      var likedClass = t.liked ? ' liked' : ''
      return '<div class="tweet" data-id="' + t.id + '">'
        + '<div class="avatar" style="background:' + t.user.color + '">' + t.user.initial + '</div>'
        + '<div class="body">'
        + '<div><span class="name">' + t.user.name + '</span><span class="handle">' + t.user.handle + ' &middot; ' + timeStr + '</span></div>'
        + '<div class="text">' + t.text + '</div>'
        + '<div class="actions">'
        + '<span class="comment-btn" data-id="' + t.id + '">&#128172; ' + t.comments + '</span>'
        + '<span class="retweet-btn" data-id="' + t.id + '">&#128257;</span>'
        + '<button class="like-btn' + likedClass + '" data-id="' + t.id + '">' + (t.liked ? '&#10084;&#65039; ' : '&#10084; ') + t.likes + '</button>'
        + '<span>&#128256;</span>'
        + '</div></div></div>'
    }

    // --- Estado ---
    var tweets = []
    var toastTimer = null

    function showToast(msg) {
      var el = document.getElementById('toast')
      el.innerHTML = msg
      el.classList.remove('hide')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(function() { el.classList.add('hide') }, 2000)
    }

    function fetchMore() {
      var feed = document.getElementById('feed')
      var spinner = document.querySelector('.spinner')
      if (!spinner) { feed.insertAdjacentHTML('beforeend', '<div class="spinner">Cargando mas...</div>') }
      localStorage.setItem('lastFetch', new Date().toISOString())

      setTimeout(function() {
        var s = document.querySelector('.spinner')
        if (s) s.remove()
        var count = 5
        var html = ''
        for (var i = 0; i < count; i++) {
          var t = generateTweet(tweets.length)
          tweets.push(t)
          html += renderTweet(t)
        }
        feed.insertAdjacentHTML('beforeend', html)
        console.log('[Feed] Cargados ' + count + ' tweets. Total: ' + tweets.length)
      }, 800 + Math.random() * 600)
    }

    // --- Like handler (event delegation) ---
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.like-btn')
      if (btn) {
        var id = parseInt(btn.dataset.id)
        var t = tweets[id]
        if (t) {
          t.liked = !t.liked
          t.likes += t.liked ? 1 : -1
          btn.innerHTML = (t.liked ? '&#10084;&#65039; ' : '&#10084; ') + t.likes
          btn.classList.toggle('liked')
          showToast(t.liked ? '&#10084;&#65039; Like guardado' : 'Ya no te gusta')
          console.log('[Feed] Like ' + (t.liked ? '' : 'un') + 'liked tweet #' + id)
        }
        return
      }
      var comment = e.target.closest('.comment-btn')
      if (comment) { showToast('&#128172; Comentarios no implementados aun'); return }
      var retweet = e.target.closest('.retweet-btn')
      if (retweet) { showToast('&#128257; Retweeted'); return }
    })

    // --- Scroll infinito ---
    var loading = false
    document.addEventListener('scroll', function() {
      if (loading) return
      var scrollY = window.scrollY || window.pageYOffset
      var threshold = document.documentElement.scrollHeight - window.innerHeight - 600
      if (scrollY >= threshold) {
        loading = true
        fetchMore()
        setTimeout(function() { loading = false }, 1500)
      }
    })

    // --- Composer ---
    var input = document.getElementById('tweet-input')
    var postBtn = document.getElementById('tweet-btn')
    input.addEventListener('input', function() {
      postBtn.disabled = input.value.trim().length === 0
    })
    postBtn.addEventListener('click', function() {
      var text = input.value.trim()
      if (!text) return
      input.value = ''
      postBtn.disabled = true
      var user = USERS[0]
      var t = {
        id: tweets.length,
        user: user,
        text: text,
        time: new Date(),
        likes: 0, liked: false, comments: 0
      }
      tweets.push(t)
      var feed = document.getElementById('feed')
      feed.insertAdjacentHTML('afterbegin', renderTweet(t))
      showToast('&#128172; Tweet publicado')
      console.log('[Feed] Nuevo tweet:', text)
      localStorage.setItem('lastTweet', text)
    })
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !postBtn.disabled) postBtn.click()
    })

    // --- Init ---
    console.log('[Feed] Inicializando feed...')
    fetchMore()
    setTimeout(fetchMore, 2000)
  </script>
</body>
</html>
